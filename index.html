<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>สรุปงาน LP รายวัน — Big C Sainoi</title>
<style>
  :root{
    --green-deep:#0B5D3B;
    --green:#12804F;
    --green-soft:#E4F3EC;
    --red:#C8272A;
    --cream:#FAF8F4;
    --ink:#1B211D;
    --muted:#6B756E;
    --line-dot:#C9CFC9;
    --card:#FFFFFF;
    --amber:#B8790A;
    --amber-soft:#FBF0DB;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:"Tahoma","Noto Sans Thai","Segoe UI",system-ui,sans-serif;
    padding-bottom:96px;
    -webkit-font-smoothing:antialiased;
  }
  header{
    background:linear-gradient(135deg,var(--green-deep),var(--green));
    color:#fff;
    padding:22px 18px 26px;
    position:relative;
    overflow:hidden;
  }
  header::after{
    content:"";
    position:absolute;
    right:-30px; top:-30px;
    width:140px;height:140px;
    border:2px solid rgba(255,255,255,0.15);
    border-radius:50%;
  }
  .header-row{display:flex;align-items:center;gap:12px;}
  header .eyebrow{
    font-size:12px;
    letter-spacing:.14em;
    text-transform:uppercase;
    opacity:.85;
    margin:0 0 4px;
  }
  header h1{
    margin:0;
    font-size:22px;
    font-weight:700;
  }
  header .sub{
    margin:4px 0 0;
    font-size:13px;
    opacity:.9;
  }

  .wrap{max-width:520px;margin:0 auto;padding:16px;}

  .card{
    background:var(--card);
    border-radius:14px;
    padding:16px;
    margin-bottom:14px;
    box-shadow:0 1px 3px rgba(11,93,59,0.08);
    border:1px solid rgba(11,93,59,0.07);
  }

  .field-row{display:flex;gap:10px;margin-bottom:10px;}
  .field{flex:1;display:flex;flex-direction:column;gap:5px;}
  label{font-size:12px;color:var(--muted);font-weight:600;}
  input[type=text], input[type=date]{
    border:1px solid #DADFDA;
    border-radius:9px;
    padding:10px 11px;
    font-size:14.5px;
    font-family:inherit;
    background:#fff;
    color:var(--ink);
    width:100%;
  }
  input:focus{outline:2px solid var(--green);outline-offset:1px;}

  .shift-toggle{display:flex;gap:8px;}
  .shift-btn{
    flex:1;
    padding:11px 8px;
    border-radius:10px;
    border:1.5px solid #DADFDA;
    background:#fff;
    font-size:14px;
    font-weight:700;
    color:var(--muted);
    cursor:pointer;
    font-family:inherit;
  }
  .shift-btn.active{
    border-color:var(--green);
    background:var(--green-soft);
    color:var(--green-deep);
  }

  .section-title{
    font-size:13px;
    font-weight:700;
    color:var(--green-deep);
    text-transform:uppercase;
    letter-spacing:.06em;
    margin:2px 0 10px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }

  .item{
    display:flex;
    gap:12px;
    padding:14px;
    border-radius:12px;
    background:#FBFCFB;
    border:1px solid #E7EBE8;
    margin-bottom:10px;
  }
  .item-body{flex:1;min-width:0;}
  .item-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    margin-bottom:9px;
  }
  .item-label-fixed{
    font-size:14.5px;
    font-weight:700;
    line-height:1.35;
    padding:5px 7px;
    width:100%;
    color:var(--ink);
  }
  .item-label{
    font-size:14.5px;
    font-weight:700;
    line-height:1.35;
    border:1px solid #DADFDA;
    background:#fff;
    padding:5px 7px;
    border-radius:7px;
    width:100%;
    color:var(--ink);
  }
  .item-label:focus{
    outline:2px solid var(--green);
    outline-offset:1px;
  }
  .remove-btn{
    border:none;background:none;color:#B7BDB7;
    font-size:17px;line-height:1;padding:2px 6px;cursor:pointer;
    flex-shrink:0;
  }
  .remove-btn:hover{color:var(--red);}

  .chips{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
  .chip{
    font-size:12px;
    padding:6px 11px;
    border-radius:999px;
    border:1px solid #DADFDA;
    background:#fff;
    color:var(--muted);
    cursor:pointer;
    font-family:inherit;
    display:inline-flex;
    align-items:center;
    gap:4px;
  }
  .chip.picked-ok{background:var(--green-soft);border-color:var(--green);color:var(--green-deep);font-weight:700;}
  .chip.picked-bad{background:#FBE7E7;border-color:var(--red);color:var(--red);font-weight:700;}
  .chip.picked-warn{background:var(--amber-soft);border-color:var(--amber);color:var(--amber);font-weight:700;}

  .note-input{
    background:#fff !important;
    border:1.3px solid #DFE4DF !important;
  }
  .note-input::placeholder{color:#A8AFA9;}

  .detail-line{
    display:flex;
    align-items:center;
    gap:7px;
    font-size:13.5px;
    color:var(--muted);
    font-weight:600;
    margin-bottom:6px;
  }
  .detail-line:last-child{margin-bottom:0;}
  .num-input{
    width:64px;
    text-align:center;
    padding:7px 6px !important;
    font-weight:700;
    color:var(--ink);
    flex:none;
  }

  .add-item-btn{
    width:100%;
    padding:11px;
    border-radius:10px;
    border:1.5px dashed #B9C4BC;
    background:transparent;
    color:var(--green-deep);
    font-weight:700;
    font-size:13.5px;
    cursor:pointer;
    font-family:inherit;
    margin-top:4px;
  }

  .preview-box{
    white-space:pre-wrap;
    font-family:"Consolas","SFMono-Regular",monospace;
    font-size:12.5px;
    line-height:1.55;
    background:#F4F6F4;
    border-radius:10px;
    padding:12px;
    color:#2B332E;
    border:1px solid #E3E8E3;
    max-height:260px;
    overflow-y:auto;
  }

  .action-bar{
    position:fixed;
    left:0;right:0;bottom:0;
    background:#fff;
    border-top:1px solid #E3E8E3;
    padding:10px 16px calc(10px + env(safe-area-inset-bottom));
    display:flex;
    gap:10px;
    max-width:520px;
    margin:0 auto;
  }
  .btn{
    flex:1;
    padding:13px 10px;
    border-radius:11px;
    border:none;
    font-size:14.5px;
    font-weight:700;
    font-family:inherit;
    cursor:pointer;
  }
  .btn-copy{background:#EEF1EE;color:var(--ink);}
  .btn-line{background:var(--green);color:#fff;}
  .btn-line:active{background:var(--green-deep);}

  .toast{
    position:fixed;
    bottom:90px;left:50%;
    transform:translateX(-50%) translateY(10px);
    background:var(--ink);
    color:#fff;
    padding:9px 16px;
    border-radius:20px;
    font-size:13px;
    opacity:0;
    transition:opacity .2s, transform .2s;
    pointer-events:none;
    white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div>
      <p class="eyebrow">Loss Prevention · Big C Hyper Sainoi</p>
      <h1>สรุปงานประจำวัน</h1>
      <p class="sub">กรอกผลตรวจ แล้วส่งเข้า LINE ได้ทันที</p>
    </div>
  </div>
</header>

<div class="wrap">

  <div class="card">
    <div class="field-row">
      <div class="field">
        <label>วันที่</label>
        <input type="date" id="reportDate">
      </div>
      <div class="field">
        <label>ผู้รายงาน</label>
        <input type="text" id="reporterName" placeholder="ชื่อ-นามสกุล">
      </div>
    </div>
    <div class="field">
      <label>กะ</label>
      <div class="shift-toggle">
        <button class="shift-btn active" data-shift="เช้า" onclick="switchShift('เช้า')">กะเช้า</button>
        <button class="shift-btn" data-shift="บ่าย" onclick="switchShift('บ่าย')">กะบ่าย</button>
      </div>
    </div>
  </div>

  <div class="card">
    <p class="section-title">รายการตรวจ</p>
    <div id="itemList"></div>
    <button class="add-item-btn" onclick="addItem()">＋ เพิ่มรายการ</button>
  </div>

  <div class="card">
    <p class="section-title">ตัวอย่างข้อความ</p>
    <div class="preview-box" id="previewBox"></div>
  </div>

  <div class="card">
    <p class="section-title">ส่งอัตโนมัติเข้ากลุ่ม</p>
    <button class="btn" id="autoSendBtn" onclick="autoSend()" style="width:100%;background:var(--green-deep);color:#fff;">ส่งเข้ากลุ่มทันที (ไม่ต้องกดซ้ำ)</button>
    <p id="autoSendStatus" style="font-size:12px;color:var(--muted);margin:8px 0 0;"></p>
  </div>

</div>

<div class="action-bar">
  <button class="btn btn-copy" onclick="copyText()">คัดลอก</button>
  <a class="btn btn-line" id="lineBtn" href="#" style="text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;">ส่งเข้า LINE</a>
</div>
<p style="text-align:center;font-size:11.5px;color:#8A928B;max-width:520px;margin:6px auto 100px;padding:0 20px;">
  หมายเหตุ: ต้องเปิดหน้านี้ด้วย Safari หรือ Chrome เท่านั้น ถ้าเปิดผ่านแอป LINE เอง ปุ่มนี้จะไม่ทำงาน
</p>

<div class="toast" id="toast"></div>

<script>
const TEMPLATES = {
  "เช้า": [
    "ตรวจสอบซีลประตู",
    "ตรวจนับสุราก่อนห้างเปิด",
    "ดึงข้อมูล Controlloss",
    "ส่งเมลขออนุมัติ Adjust code",
    "ตรวจนับ DCP อาหารสด",
    "ตรวจสอบสินค้าหมดอายุ",
    "ตรวจสอบการนับเซฟรอบเช้า",
    "เปิดล็อคแคชเชียร์",
    "Morning Brief พนักงาน&Pc",
    "ตรวจสอบสินค้า OSX",
    "คีย์ระบบ GMC",
    "ตรวจสอบการส่งเงินกันภัย",
    "ตรวจสอบการทำคืน CN เช้า",
    "ตรวจสอบ ADJUST CODE"
  ],
  "บ่าย": [
    "ตรวจสอบ ADJ code",
    "ตรวจการลงข้อมูล ADJ Code",
    "ตรวจสอบ PODS",
    "ตรวจสอบการทำ RTC ช่วงเย็น",
    "ตรวจการปิดประตูทุกประตู",
    "ตรวจการส่งซีลประตู",
    "ตรวจนับสุราก่อนห้างปิด",
    "ตรวจสอบอุณหภูมิ",
    "ตรวจสรุปใบผ่าน F7 & OSX",
    "ตรวจสอบการปิดล็อคแคชเชียร์",
    "ตรวจสอบการนับเงิน",
    "ร่วมกับ MTN ตรวจสอบพื้นที่พลาซ่าและด้านหลัง FF"
  ]
};

const HEADER_ICON = { "เช้า": "🔷", "บ่าย": "♦️" };

let currentShift = "เช้า";
let items = [];
let seq = 0;

function newItem(label, kind, locked){
  seq++;
  const it = { id: "it"+seq, label: label, status: "เรียบร้อย", kind: kind || "normal", locked: !!locked };
  if(kind === "gmc"){ it.gmcCount = ""; it.status = "จำนวน … บิล"; }
  if(kind === "pods"){ it.podsPending = ""; it.podsDefer = ""; it.status = "ค้าง … บิล เลื่อนส่ง … บิล"; }
  return it;
}

function loadTemplate(shift){
  items = TEMPLATES[shift].map(label=>{
    let kind = "normal";
    if(label === "คีย์ระบบ GMC") kind = "gmc";
    if(label === "ตรวจสอบ PODS") kind = "pods";
    return newItem(label, kind, true);
  });
}

function switchShift(shift){
  currentShift = shift;
  document.querySelectorAll(".shift-btn").forEach(b=>{
    b.classList.toggle("active", b.dataset.shift === shift);
  });
  loadTemplate(shift);
  render();
}

function addItem(){
  items.push(newItem(""));
  render();
}

function removeItem(id){
  items = items.filter(i => i.id !== id);
  render();
}

function setStatus(id, val){
  const it = items.find(i=>i.id===id);
  if(it) it.status = val;
  render();
}

function setLabel(id, val){
  const it = items.find(i=>i.id===id);
  if(it) it.label = val;
  updatePreview();
}

function setNote(id, val){
  const it = items.find(i=>i.id===id);
  if(it) it.status = val;
  updatePreview();
}

function setGmcCount(id, val){
  const it = items.find(i=>i.id===id);
  if(!it) return;
  it.gmcCount = val;
  it.status = `จำนวน ${val || "…"} บิล`;
  updatePreview();
}

function setPodsField(id, field, val){
  const it = items.find(i=>i.id===id);
  if(!it) return;
  it[field] = val;
  it.status = `ค้าง ${it.podsPending || "…"} บิล เลื่อนส่ง ${it.podsDefer || "…"} บิล`;
  updatePreview();
}

function chipClass(it, val){
  if(it.status !== val) return "chip";
  if(val === "เรียบร้อย") return "chip picked-ok";
  if(val === "ไม่มีการตรวจสอบ") return "chip picked-warn";
  return "chip picked-bad";
}

function render(){
  const list = document.getElementById("itemList");
  list.innerHTML = "";
  items.forEach(it=>{
    const row = document.createElement("div");
    row.className = "item";

    let detailHtml;
    if(it.kind === "gmc"){
      detailHtml = `
        <div class="detail-line">
          <span>จำนวน</span>
          <input type="number" inputmode="numeric" class="note-input num-input" placeholder="0" value="${escapeAttr(it.gmcCount)}" oninput="setGmcCount('${it.id}', this.value)">
          <span>บิล</span>
        </div>`;
    } else if(it.kind === "pods"){
      detailHtml = `
        <div class="detail-line">
          <span>ค้าง</span>
          <input type="number" inputmode="numeric" class="note-input num-input" placeholder="0" value="${escapeAttr(it.podsPending)}" oninput="setPodsField('${it.id}','podsPending', this.value)">
          <span>บิล</span>
        </div>
        <div class="detail-line">
          <span>เลื่อนส่ง</span>
          <input type="number" inputmode="numeric" class="note-input num-input" placeholder="0" value="${escapeAttr(it.podsDefer)}" oninput="setPodsField('${it.id}','podsDefer', this.value)">
          <span>บิล</span>
        </div>`;
    } else {
      detailHtml = `<input type="text" class="note-input" placeholder="รายละเอียดเพิ่มเติม เช่น ค้าง 2 บิล / จำนวน 10 บิล" value="${escapeAttr(it.status)}" oninput="setNote('${it.id}', this.value)">`;
    }

    row.innerHTML = `
      <div class="item-body">
        <div class="item-top">
          ${it.locked
            ? `<div class="item-label-fixed">${escapeHtml(it.label)}</div>`
            : `<input type="text" class="item-label" value="${escapeAttr(it.label)}" placeholder="ชื่อรายการตรวจ" oninput="setLabel('${it.id}', this.value)">`
          }
          <button class="remove-btn" onclick="removeItem('${it.id}')" title="ลบรายการนี้">✕</button>
        </div>
        <div class="chips">
          <button class="${chipClass(it,'เรียบร้อย')}" onclick="setStatus('${it.id}','เรียบร้อย')">เรียบร้อย</button>
          <button class="${chipClass(it,'ไม่เรียบร้อย')}" onclick="setStatus('${it.id}','ไม่เรียบร้อย')">ไม่เรียบร้อย</button>
          <button class="${chipClass(it,'ไม่มีการตรวจสอบ')}" onclick="setStatus('${it.id}','ไม่มีการตรวจสอบ')">ไม่มีการตรวจสอบ</button>
        </div>
        ${detailHtml}
      </div>
    `;
    list.appendChild(row);
  });
  updatePreview();
}

function escapeAttr(s){
  return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;");
}

function escapeHtml(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function thaiDate(dateStr){
  const months = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
  const d = new Date(dateStr + "T00:00:00");
  const day = d.getDate();
  const month = months[d.getMonth()];
  const year = d.getFullYear() + 543;
  return `${day} ${month} ${year}`;
}

function buildText(){
  const dateVal = document.getElementById("reportDate").value;
  const name = document.getElementById("reporterName").value.trim() || "-";
  const dateText = dateVal ? thaiDate(dateVal) : "-";
  const icon = HEADER_ICON[currentShift];
  const divider = "•".repeat(29);

  let lines = [];
  lines.push(`${icon}สรุปงานกะ${currentShift}${icon}`);
  lines.push("");
  lines.push(`วันที่ ${dateText}`);
  lines.push("");
  items.forEach(it=>{
    if(!it.label.trim()) return;
    lines.push(`- ${it.label}`);
    lines.push(`: ${it.status || "-"}`);
    lines.push(divider);
  });
  lines.push("");
  lines.push("ผู้รายงาน");
  lines.push(name);
  lines.push("LOSS PREVENTION");
  lines.push("BIG C HYPER SAINOI");

  return lines.join("\n");
}

function updatePreview(){
  document.getElementById("previewBox").textContent = buildText();
  const url = "https://line.me/R/msg/text/?" + encodeURIComponent(buildText());
  document.getElementById("lineBtn").setAttribute("href", url);
}

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 1800);
}

function copyText(){
  const text = buildText();
  navigator.clipboard.writeText(text).then(()=>{
    showToast("คัดลอกข้อความแล้ว");
  }).catch(()=>{
    showToast("คัดลอกไม่สำเร็จ ลองแตะค้างที่กล่องข้อความแทน");
  });
}

function sendLine(){
  const text = buildText();
  const url = "https://line.me/R/msg/text/?" + encodeURIComponent(text);
  window.location.href = url;
}

// ── ตั้งค่าการส่งอัตโนมัติเข้ากลุ่ม (แก้ 2 บรรทัดนี้หลังจาก deploy Cloudflare Worker แล้ว) ──
const WORKER_URL = "https://REPLACE-WITH-YOUR-WORKER-URL.workers.dev";
const FORM_SECRET = "REPLACE-WITH-YOUR-SECRET";

function autoSend(){
  const statusEl = document.getElementById("autoSendStatus");
  const btn = document.getElementById("autoSendBtn");
  if(WORKER_URL.includes("REPLACE-WITH")){
    statusEl.textContent = "ยังไม่ได้ตั้งค่า WORKER_URL / FORM_SECRET ในไฟล์นี้";
    statusEl.style.color = "var(--red)";
    return;
  }
  btn.disabled = true;
  statusEl.textContent = "กำลังส่ง...";
  statusEl.style.color = "var(--muted)";
  fetch(WORKER_URL + "/push", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + FORM_SECRET
    },
    body: JSON.stringify({ text: buildText() })
  }).then(res=>{
    btn.disabled = false;
    if(res.ok){
      statusEl.textContent = "ส่งเข้ากลุ่มเรียบร้อยแล้ว";
      statusEl.style.color = "var(--green-deep)";
      showToast("ส่งเข้ากลุ่มแล้ว");
    } else {
      statusEl.textContent = "ส่งไม่สำเร็จ (" + res.status + ") ลองใหม่ หรือใช้ปุ่ม “ส่งเข้า LINE” แทน";
      statusEl.style.color = "var(--red)";
    }
  }).catch(()=>{
    btn.disabled = false;
    statusEl.textContent = "เชื่อมต่อไม่ได้ ตรวจสอบอินเทอร์เน็ต หรือใช้ปุ่ม “ส่งเข้า LINE” แทน";
    statusEl.style.color = "var(--red)";
  });
}

// init
document.getElementById("reportDate").valueAsDate = new Date();
document.getElementById("reportDate").addEventListener("input", updatePreview);
document.getElementById("reporterName").addEventListener("input", updatePreview);
loadTemplate(currentShift);
